version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: smartstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartstock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - '5432:5432'
    volumes:
      - smartstock_pgdata:/var/lib/postgresql/data

volumes:
  smartstock_pgdata:
